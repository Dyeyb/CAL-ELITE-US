<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CAL ELITE · Service Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#c9a020;
  --gold-hi:#f0c040;
  --gold-lo:rgba(201,160,32,0.09);
  --gold-lo2:rgba(201,160,32,0.16);
  --gold-bd:rgba(201,160,32,0.22);
  --bg:#080809;
  --surface:#111114;
  --surface2:#17171c;
  --surface3:#1e1e25;
  --border:rgba(255,255,255,0.055);
  --border2:rgba(255,255,255,0.03);
  --text:#e8e8ee;
  --text2:#9494a4;
  --text3:#545464;
  --green:#34d464;
  --green-lo:rgba(52,212,100,0.1);
  --green-bd:rgba(52,212,100,0.25);
  --amber:#f5a623;
  --amber-lo:rgba(245,166,35,0.1);
  --amber-bd:rgba(245,166,35,0.25);
  --red:#f05252;
  --red-lo:rgba(240,82,82,0.1);
  --red-bd:rgba(240,82,82,0.22);
  --blue:#6ea8fe;
  --blue-lo:rgba(110,168,254,0.1);
  --blue-bd:rgba(110,168,254,0.22);
  --t:all 0.2s cubic-bezier(0.4,0,0.2,1);
  --sw:256px;
  --r:10px;
  --r2:7px;
}

html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text2);display:flex;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;z-index:10;flex-shrink:0;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:-1px;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent 0%,var(--gold-bd) 30%,var(--gold-bd) 70%,transparent 100%);
}

.sb-brand{
  padding:24px 20px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:11px;
}
.sb-mark{
  width:38px;height:38px;border-radius:9px;
  background:linear-gradient(145deg,#a87a10,var(--gold-hi));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant',serif;font-size:22px;font-weight:600;color:#07060a;
  flex-shrink:0;box-shadow:0 4px 18px rgba(201,160,32,0.22);
}
.sb-wm{line-height:1.15;}
.sb-title{font-family:'Cormorant',serif;font-size:17px;font-weight:600;color:var(--text);}
.sb-title em{color:var(--gold-hi);font-style:italic;}
.sb-sub{font-family:'Fira Code',monospace;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-top:2px;}

.sb-nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.sb-glabel{
  font-family:'Fira Code',monospace;font-size:7.5px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);opacity:0.38;padding:14px 10px 7px;
}
.sb-link{
  display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--r2);
  font-size:13.5px;font-weight:500;color:var(--text3);text-decoration:none;
  border:1px solid transparent;transition:var(--t);cursor:pointer;
}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.035);}
.sb-link.active{color:var(--gold-hi);background:var(--gold-lo2);border-color:var(--gold-bd);font-weight:600;}
.sb-ico{
  width:30px;height:30px;border-radius:6px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.055);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--t);
}
.sb-ico svg{width:14px;height:14px;stroke:var(--text3);transition:var(--t);fill:none;}
.sb-link:hover .sb-ico{background:rgba(255,255,255,0.05);}
.sb-link:hover .sb-ico svg{stroke:var(--text);}
.sb-link.active .sb-ico{background:var(--gold-lo2);border-color:var(--gold-bd);}
.sb-link.active .sb-ico svg{stroke:var(--gold-hi);}
.sb-pill{
  margin-left:auto;font-family:'Fira Code',monospace;font-size:9.5px;
  min-width:22px;height:19px;padding:0 6px;border-radius:6px;
  background:rgba(255,255,255,0.05);color:var(--text3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--t);
}
.sb-link.active .sb-pill{background:rgba(201,160,32,0.18);color:var(--gold-hi);}
.sb-hr{height:1px;background:var(--border);margin:10px 8px;}

.sb-foot{padding:14px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.sb-user{
  display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:var(--r2);
  background:rgba(255,255,255,0.025);border:1px solid var(--border);
}
.sb-av{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#a07010,var(--gold-hi));
  color:#07060a;font-family:'Cormorant',serif;font-size:17px;font-weight:600;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-uname{font-size:13px;font-weight:600;color:var(--text);}
.sb-urole{font-size:11px;color:var(--text3);margin-top:1px;}
.sb-logout{
  display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r2);
  background:none;border:1px solid rgba(240,82,82,0.14);cursor:pointer;transition:var(--t);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:rgba(240,82,82,0.45);width:100%;
}
.sb-logout:hover{background:var(--red-lo);border-color:var(--red-bd);color:var(--red);}
.sb-logout svg{width:13px;height:13px;stroke:currentColor;fill:none;flex-shrink:0;}

/* ─── MAIN ─── */
.main{flex:1;min-width:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.topbar{
  height:60px;flex-shrink:0;padding:0 28px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.topbar-title{font-family:'Cormorant',serif;font-size:22px;font-weight:600;color:var(--text);white-space:nowrap;}
.topbar-title em{color:var(--gold-hi);font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.search{
  display:flex;align-items:center;gap:8px;height:36px;padding:0 13px;
  border-radius:var(--r2);background:var(--surface2);border:1px solid var(--border);transition:var(--t);
}
.search:focus-within{border-color:var(--gold-bd);background:var(--surface3);}
.search svg{width:13px;height:13px;stroke:var(--text3);flex-shrink:0;fill:none;}
.search input{
  background:none;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);width:210px;
}
.search input::placeholder{color:var(--text3);}
.tb-btn{
  width:36px;height:36px;border-radius:var(--r2);background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--t);color:var(--text3);position:relative;flex-shrink:0;
}
.tb-btn:hover{border-color:var(--gold-bd);color:var(--gold-hi);background:var(--gold-lo);}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;}
.notif-dot{
  position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;
  background:var(--gold-hi);border:2px solid var(--surface);
}

/* ─── SCROLL BODY ─── */
.body-scroll{flex:1;overflow-y:auto;padding:24px 28px 48px;}

/* ─── STAT CARDS ─── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;display:flex;flex-direction:column;gap:14px;
  transition:border-color 0.2s;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-bd),transparent);
  opacity:0;transition:opacity 0.25s;
}
.stat-card:hover{border-color:rgba(255,255,255,0.09);}
.stat-card:hover::after{opacity:1;}
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;}
.stat-ico{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.stat-ico svg{width:18px;height:18px;fill:none;}
.stat-tag{
  font-family:'Fira Code',monospace;font-size:9px;letter-spacing:0.5px;
  padding:3px 8px;border-radius:5px;
}
.stat-tag.up{background:var(--green-lo);color:var(--green);}
.stat-tag.neu{background:rgba(255,255,255,0.05);color:var(--text3);}
.stat-num{font-family:'Cormorant',serif;font-size:36px;font-weight:500;color:var(--text);line-height:1;}
.stat-lbl{font-size:12px;font-weight:500;color:var(--text3);margin-top:4px;}

/* ─── PANEL ─── */
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.panel-inner{background:transparent;}

/* tabs */
.tabs{
  display:flex;align-items:stretch;border-bottom:1px solid var(--border);
  background:var(--surface);padding:0 6px;overflow-x:auto;
}
.tab{
  display:flex;align-items:center;gap:7px;padding:0 16px;height:44px;
  font-size:13px;font-weight:500;color:var(--text3);border:none;
  border-bottom:2px solid transparent;background:none;cursor:pointer;
  transition:var(--t);white-space:nowrap;flex-shrink:0;margin-bottom:-1px;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold-hi);border-bottom-color:var(--gold-hi);font-weight:600;}
.tab-n{
  font-family:'Fira Code',monospace;font-size:9px;padding:2px 6px;border-radius:5px;
  background:rgba(255,255,255,0.055);color:var(--text3);transition:var(--t);
}
.tab.active .tab-n{background:rgba(201,160,32,0.18);color:var(--gold-hi);}

/* toolbar */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px;border-bottom:1px solid var(--border2);gap:12px;
}
.toolbar-info{font-size:13px;color:var(--text3);}
.toolbar-info b{color:var(--text);font-weight:600;}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.tbar-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r2);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:var(--t);
  border:1px solid var(--border);background:var(--surface3);color:var(--text3);
}
.tbar-btn:hover{border-color:var(--gold-bd);color:var(--gold-hi);}
.tbar-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;}
.tbar-exp{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r2);
  font-size:12px;font-weight:600;cursor:pointer;transition:var(--t);
  border:1px solid var(--gold-bd);background:var(--gold-lo);color:var(--gold-hi);
}
.tbar-exp:hover{background:var(--gold-lo2);}
.tbar-exp svg{width:12px;height:12px;stroke:currentColor;fill:none;}

/* ─── ORDER CARDS ─── */
.orders-list{
  display:flex;flex-direction:column;gap:14px;
  padding:16px 16px 20px;
}

.oc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color 0.2s, box-shadow 0.2s;
  cursor:pointer;
}
.oc:hover{
  border-color:rgba(255,255,255,0.1);
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}

/* Header: ID chip + meta + badge */
.oc-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.015);
}
.oc-id-chip{
  font-family:'Fira Code',monospace;font-size:11px;font-weight:500;
  color:var(--gold);background:var(--gold-lo);
  border:1px solid var(--gold-bd);border-radius:5px;
  padding:3px 9px;flex-shrink:0;letter-spacing:0.3px;
}
.oc-meta-info{
  display:flex;align-items:center;gap:6px;
  font-size:11.5px;color:var(--text3);flex:1;min-width:0;
}
.oc-meta-info svg{width:11px;height:11px;stroke:var(--text3);opacity:0.5;fill:none;flex-shrink:0;}
.oc-dot{color:var(--surface3);font-size:14px;}

/* status badge */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Fira Code',monospace;font-size:9px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:5px;flex-shrink:0;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge-pending{background:var(--amber-lo);color:var(--amber);border:1px solid var(--amber-bd);}
.badge-pending::before{background:var(--amber);}
.badge-success{background:var(--green-lo);color:var(--green);border:1px solid var(--green-bd);}
.badge-success::before{background:var(--green);}
.badge-cancelled{background:var(--red-lo);color:var(--red);border:1px solid var(--red-bd);}
.badge-cancelled::before{background:var(--red);}
.badge-dispatch{background:var(--blue-lo);color:var(--blue);border:1px solid var(--blue-bd);}
.badge-dispatch::before{background:var(--blue);}

/* Body: 3-column grid */
.oc-body{
  display:grid;grid-template-columns:56px 1fr auto;
  gap:16px;align-items:start;
  padding:18px 20px 14px;
}
.oc-svc-icon{
  width:56px;height:56px;border-radius:11px;
  background:var(--gold-lo);border:1px solid var(--gold-bd);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.oc-svc-icon svg{width:24px;height:24px;stroke:var(--gold);fill:none;}
.oc-svc-info{min-width:0;}
.oc-svc-name{
  font-family:'Cormorant',serif;font-size:22px;font-weight:600;color:var(--text);
  line-height:1.15;margin-bottom:10px;
}
.oc-fields{display:flex;flex-direction:column;gap:6px;}
.oc-field{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text3);}
.oc-field svg{width:13px;height:13px;stroke:var(--gold);opacity:0.5;fill:none;flex-shrink:0;}
.oc-field-label{font-size:11px;color:var(--text3);margin-right:2px;}
.oc-field-val{color:var(--text);font-weight:500;}

.oc-price-col{
  display:flex;flex-direction:column;align-items:flex-end;gap:3px;
  padding-top:4px;flex-shrink:0;
}
.oc-price-label{font-family:'Fira Code',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
.oc-price{font-family:'Cormorant',serif;font-size:30px;font-weight:600;color:var(--gold-hi);line-height:1;}

/* Progress */
.oc-prog{padding:2px 20px 16px;}
.prog-track{display:flex;align-items:center;}
.prog-node{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fira Code',monospace;font-size:9px;font-weight:500;
  border:1.5px solid var(--surface3);background:var(--surface3);color:var(--text3);transition:var(--t);z-index:1;
}
.prog-node.done{background:var(--green-lo);border-color:var(--green);color:var(--green);}
.prog-node.active{background:var(--gold-lo2);border-color:var(--gold);color:var(--gold-hi);box-shadow:0 0 10px rgba(201,160,32,0.18);}
.prog-line{flex:1;height:1.5px;background:var(--surface3);}
.prog-line.done{background:linear-gradient(90deg,var(--green),rgba(52,212,100,0.2));opacity:0.5;}
.prog-labels{display:flex;justify-content:space-between;margin-top:5px;}
.prog-lbl{font-family:'Fira Code',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.4px;color:var(--text3);flex:1;text-align:center;}
.prog-lbl:first-child{text-align:left;}
.prog-lbl:last-child{text-align:right;}
.prog-lbl.done{color:var(--green);opacity:0.6;}
.prog-lbl.active{color:var(--gold);}

/* ─── ACTION FOOTER: clearly separated left and right ─── */
.oc-foot{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  padding:14px 20px 18px;
  border-top:1px solid var(--border);
}
.oc-foot-left{
  display:flex;align-items:center;gap:10px;
}
.oc-foot-right{
  display:flex;align-items:center;gap:10px;
}

/* BUTTONS — ample padding, clearly legible */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:var(--r2);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--t);border:1px solid transparent;
  white-space:nowrap;flex-shrink:0;letter-spacing:0.1px;
}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;flex-shrink:0;}

.btn-ghost{background:var(--surface3);border-color:var(--border);color:var(--text3);}
.btn-ghost:hover{border-color:var(--gold-bd);color:var(--gold-hi);}

.btn-blue{background:var(--blue-lo);border-color:var(--blue-bd);color:var(--blue);}
.btn-blue:hover{background:rgba(110,168,254,0.18);}

.btn-green{background:var(--green-lo);border-color:var(--green-bd);color:var(--green);}
.btn-green:hover{background:rgba(52,212,100,0.18);}

.btn-red{background:var(--red-lo);border-color:var(--red-bd);color:var(--red);}
.btn-red:hover{background:rgba(240,82,82,0.18);}

/* empty */
.empty{padding:70px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;}
.empty-ico{
  width:58px;height:58px;border-radius:12px;
  background:var(--gold-lo);border:1px solid var(--gold-bd);
  display:flex;align-items:center;justify-content:center;
}
.empty-ico svg{width:26px;height:26px;stroke:var(--gold);fill:none;}
.empty-title{font-family:'Cormorant',serif;font-size:22px;font-weight:600;color:var(--text);}
.empty-sub{font-size:13px;color:var(--text3);}

/* ─── DRAWER ─── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity 0.28s;
}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:500px;
  background:var(--surface);border-left:1px solid var(--gold-bd);
  z-index:201;transform:translateX(100%);
  transition:transform 0.34s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.drawer::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold-hi),var(--gold),transparent);
}
.drawer.open{transform:translateX(0);}
.dw-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 26px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.dw-title{font-family:'Cormorant',serif;font-size:24px;font-weight:600;color:var(--text);}
.dw-title em{color:var(--gold-hi);font-style:italic;}
.dw-close{
  width:32px;height:32px;border-radius:6px;background:none;border:1px solid var(--border);
  cursor:pointer;color:var(--text3);font-size:19px;
  display:flex;align-items:center;justify-content:center;transition:var(--t);
}
.dw-close:hover{color:var(--gold-hi);border-color:var(--gold-bd);background:var(--gold-lo);}
.dw-body{flex:1;overflow-y:auto;padding:22px 26px;}
.dw-sec{margin-bottom:24px;}
.dw-sec-title{
  font-family:'Fira Code',monospace;font-size:8.5px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);opacity:0.5;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.dw-sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-bd),transparent);}
.dw-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:11px 0;border-bottom:1px solid var(--border2);gap:16px;
}
.dw-row:last-child{border-bottom:none;}
.dw-key{font-size:12px;font-weight:500;color:var(--text3);flex-shrink:0;padding-top:1px;}
.dw-val{font-size:13px;font-weight:600;color:var(--text);text-align:right;max-width:62%;word-break:break-word;}
.dw-val.gold{font-family:'Cormorant',serif;font-size:22px;color:var(--gold-hi);line-height:1;}
.dw-foot{
  padding:16px 26px;border-top:1px solid var(--border);
  display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.dw-foot .btn{flex:1;justify-content:center;min-width:120px;}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(10px);
  padding:10px 18px;border-radius:8px;font-size:12.5px;font-weight:600;
  display:flex;align-items:center;gap:9px;
  z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast svg{width:13px;height:13px;fill:none;flex-shrink:0;}
.toast-ok{background:#0b1d10;border:1px solid var(--green-bd);color:var(--green);}
.toast-err{background:#1d0b0b;border:1px solid var(--red-bd);color:var(--red);}

@media(max-width:900px){
  .sidebar{display:none;} .stat-row{grid-template-columns:repeat(2,1fr);}
  .drawer{width:100%;} .oc-body{grid-template-columns:56px 1fr;}
  .oc-price-col{display:none;}
}

<script>
(function(){
const SEED=[
  {id:'BK-SEED01',service:'House Detailing',date:'2025-06-10',address:'123 Rizal St, Makati City',origin:'Foshan Central Hub',time:'morning',price:320,status:'success',timestamp:'2025-06-09T08:00:00Z',notes:'Please bring extra polish.'},
  {id:'BK-SEED02',service:'Panel Installation',date:'2025-06-14',address:'Block 7 Lot 3, BF Homes, Parañaque',origin:'Nanhai Branch',time:'afternoon',price:550,status:'dispatch',timestamp:'2025-06-13T11:30:00Z',notes:''},
  {id:'BK-SEED03',service:'Electrical Setup',date:'2025-06-20',address:'Unit 4B Torre de Manila, Ermita',origin:'Lishui Station',time:'morning',price:235,status:'pending',timestamp:'2025-06-18T09:15:00Z',notes:'Second floor unit.'},
  {id:'BK-SEED04',service:'Custom Fabrication',date:'2025-06-22',address:'Greenhills Shopping Center, San Juan',origin:'Shunde Logistics',time:'evening',price:720,status:'pending',timestamp:'2025-06-19T16:00:00Z',notes:'Need custom sizes.'},
  {id:'BK-SEED05',service:'Final Inspection',date:'2025-06-08',address:'Eastwood City, Libis, QC',origin:'Foshan Central Hub',time:'morning',price:195,status:'cancelled',timestamp:'2025-06-07T10:00:00Z',notes:''},
  {id:'BK-SEED06',service:'On-Site Install',date:'2025-06-25',address:'Ayala Triangle, Makati',origin:'Nanhai Branch',time:'afternoon',price:490,status:'success',timestamp:'2025-06-24T14:00:00Z',notes:'Corporate lobby.'},
  {id:'BK-SEED07',service:'Material Removal',date:'2025-06-28',address:'Bonifacio Global City, Taguig',origin:'Lishui Station',time:'morning',price:310,status:'pending',timestamp:'2025-06-26T08:45:00Z',notes:'Heavy lift required.'},
  {id:'BK-SEED08',service:'Wall Cladding',date:'2025-07-02',address:'Ortigas Center, Pasig',origin:'Foshan Central Hub',time:'afternoon',price:560,status:'dispatch',timestamp:'2025-07-01T12:00:00Z',notes:'8th floor.'},
  {id:'BK-SEED09',service:'Surface Prep',date:'2025-07-05',address:'Alabang Town Center, Muntinlupa',origin:'Shunde Logistics',time:'morning',price:280,status:'success',timestamp:'2025-07-04T09:00:00Z',notes:''},
  {id:'BK-SEED10',service:'LED Lighting Setup',date:'2025-07-08',address:'SM Mall of Asia, Pasay',origin:'Nanhai Branch',time:'evening',price:395,status:'pending',timestamp:'2025-07-07T17:00:00Z',notes:'Outdoor area.'},
];

let stored=[];
try{stored=JSON.parse(localStorage.getItem('ceBookings')||'[]');}catch(e){}
const ids=new Set(stored.map(b=>b.id));
const merged=[...stored,...SEED.filter(s=>!ids.has(s.id))];
localStorage.setItem('ceBookings',JSON.stringify(merged));

let bookings=merged,curTab='all',searchQ='',sortAsc=false;

const su=JSON.parse(sessionStorage.getItem('user')||'null');
if(su){const n=((su.first_name||'')+' '+(su.last_name||'')).trim()||'User';document.getElementById('sbName').textContent=n;document.getElementById('sbAv').textContent=n[0].toUpperCase();}
else{document.getElementById('sbName').textContent='Guest';document.getElementById('sbAv').textContent='G';}

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  const ico=type==='ok'?'<svg stroke="currentColor" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>':'<svg stroke="currentColor" viewBox="0 0 24 24" fill="none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>';
  el.className=`toast toast-${type}`;el.innerHTML=ico+' '+msg;
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>el.classList.remove('show'),3200);
}

const fmtDate=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}catch(e){return d;}};
const fmtTime=t=>({morning:'Morning · 8AM – 12PM',afternoon:'Afternoon · 1PM – 5PM',evening:'Evening · 6PM – 9PM'}[t]||t||'—');

const ICONS={
  default:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>',
  'House Detailing':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>',
  'Electrical Setup':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',
  'LED Lighting Setup':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>',
  'Final Inspection':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
};
const getIcon=s=>ICONS[s]||ICONS.default;

const STEPS=['Booked','Confirmed','In Dispatch','Completed'];
const stepIdx=s=>({pending:0,dispatch:2,success:3}[s]??0);

function badgeHtml(s){
  const cls={pending:'badge-pending',success:'badge-success',cancelled:'badge-cancelled',dispatch:'badge-dispatch'};
  const lbl={pending:'Pending',success:'Completed',cancelled:'Cancelled',dispatch:'In Dispatch'};
  return`<span class="badge ${cls[s]||'badge-pending'}">${lbl[s]||s}</span>`;
}

function progressHtml(b){
  if(b.status==='cancelled')return'';
  const si=stepIdx(b.status);
  return`<div class="oc-prog">
    <div class="prog-track">
      ${STEPS.map((s,i)=>`${i>0?`<div class="prog-line${i<=si?' done':''}"></div>`:''}
        <div class="prog-node${i<si?' done':i===si?' active':''}">${i<si?'✓':i+1}</div>`).join('')}
    </div>
    <div class="prog-labels">
      ${STEPS.map((s,i)=>`<span class="prog-lbl${i<si?' done':i===si?' active':''}">${s}</span>`).join('')}
    </div>
  </div>`;
}

const filtered=()=>bookings
  .filter(b=>{
    if(curTab!=='all'&&b.status!==curTab)return false;
    if(searchQ){const q=searchQ.toLowerCase();return(b.id||'').toLowerCase().includes(q)||(b.service||'').toLowerCase().includes(q)||(b.address||'').toLowerCase().includes(q);}
    return true;
  })
  .sort((a,b)=>{const ta=new Date(a.timestamp||0).getTime(),tb=new Date(b.timestamp||0).getTime();return sortAsc?ta-tb:tb-ta;});

const countOf=s=>bookings.filter(b=>s==='all'||b.status===s).length;
const revenue=()=>bookings.filter(b=>b.status==='success').reduce((s,b)=>s+(b.price||0),0);
const save=()=>localStorage.setItem('ceBookings',JSON.stringify(bookings));

function updateCounts(){
  const all=bookings.length,pend=countOf('pending'),done=countOf('success'),canc=countOf('cancelled'),disp=countOf('dispatch');
  document.getElementById('stTotal').textContent=all;
  document.getElementById('stPend').textContent=pend;
  document.getElementById('stDone').textContent=done;
  document.getElementById('stRev').textContent='$'+revenue().toLocaleString();
  document.getElementById('sbAll').textContent=all;
  document.getElementById('sbPend').textContent=pend;
  document.getElementById('sbDisp').textContent=disp;
  document.getElementById('sbSucc').textContent=done;
  document.getElementById('sbCanc').textContent=canc;
  document.getElementById('tcAll').textContent=all;
  document.getElementById('tcPend').textContent=pend;
  document.getElementById('tcDisp').textContent=disp;
  document.getElementById('tcSucc').textContent=done;
  document.getElementById('tcCanc').textContent=canc;
}

function render(){
  updateCounts();
  const list=filtered();
  const el=document.getElementById('ordersList');
  document.getElementById('toolbarInfo').innerHTML=
    list.length===0?'No orders found':list.length===1?'Showing <b>1</b> order':`Showing <b>${list.length}</b> orders`;

  if(!list.length){
    el.innerHTML=`<div class="empty">
      <div class="empty-ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg></div>
      <div class="empty-title">No Orders Found</div>
      <div class="empty-sub">Orders will appear here once customers book a service.</div>
    </div>`;
    return;
  }

  el.innerHTML=list.map(b=>`
    <div class="oc" data-id="${b.id}">

      <!-- Header row -->
      <div class="oc-head">
        <span class="oc-id-chip">${b.id}</span>
        <div class="oc-meta-info">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="2" stroke-linecap="round"/></svg>
          Booked ${fmtDate(b.timestamp)}
          <span class="oc-dot">·</span>
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          ${b.origin||'Foshan Central Hub'}
        </div>
        ${badgeHtml(b.status)}
      </div>

      <!-- Body: icon | info | price -->
      <div class="oc-body">
        <div class="oc-svc-icon">${getIcon(b.service)}</div>

        <div class="oc-svc-info">
          <div class="oc-svc-name">${b.service}</div>
          <div class="oc-fields">
            <span class="oc-field">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span class="oc-field-label">Date:</span>
              <span class="oc-field-val">${fmtDate(b.date)}</span>
            </span>
            <span class="oc-field">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span class="oc-field-label">Time:</span>
              <span class="oc-field-val">${fmtTime(b.time)}</span>
            </span>
            <span class="oc-field">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
              <span class="oc-field-val" style="color:var(--text2);">${b.address||'—'}</span>
            </span>
          </div>
        </div>

        <div class="oc-price-col">
          <span class="oc-price-label">Total</span>
          <span class="oc-price">$${(b.price||0).toLocaleString()}</span>
        </div>
      </div>

      <!-- Progress tracker -->
      ${progressHtml(b)}

      <!-- Actions: View Details on left | Status actions on right -->
      <div class="oc-foot">
        <div class="oc-foot-left">
          <button class="btn btn-ghost" data-id="${b.id}" data-act="detail">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            View Details
          </button>
        </div>
        <div class="oc-foot-right">
          ${b.status==='pending'?`
            <button class="btn btn-blue" data-id="${b.id}" data-act="dispatch">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
              Dispatch Order
            </button>
            <button class="btn btn-red" data-id="${b.id}" data-act="cancel">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              Cancel Order
            </button>
          `:b.status==='dispatch'?`
            <button class="btn btn-green" data-id="${b.id}" data-act="complete">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              Mark as Completed
            </button>
          `:''}
        </div>
      </div>

    </div>
  `).join('');

  el.querySelectorAll('[data-act]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.dataset.id,act=btn.dataset.act;
      if(act==='detail'){openDrawer(id);return;}
      const b=bookings.find(x=>x.id===id);if(!b)return;
      if(act==='dispatch'){b.status='dispatch';toast('Order dispatched!','ok');}
      else if(act==='complete'){b.status='success';toast('Marked as completed!','ok');}
      else if(act==='cancel'){if(!confirm('Cancel this order?'))return;b.status='cancelled';toast('Order cancelled.','err');}
      save();render();
    });
  });

  el.querySelectorAll('.oc').forEach(card=>{
    card.addEventListener('click',()=>openDrawer(card.dataset.id));
  });
}

function openDrawer(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  document.getElementById('dwBody').innerHTML=`
    <div class="dw-sec">
      <div class="dw-sec-title">Order Info</div>
      <div class="dw-row"><span class="dw-key">Order ID</span><span class="dw-val" style="font-family:'Fira Code',monospace;color:var(--gold);font-size:11.5px;">${b.id}</span></div>
      <div class="dw-row"><span class="dw-key">Placed On</span><span class="dw-val">${fmtDate(b.timestamp)}</span></div>
      <div class="dw-row"><span class="dw-key">Status</span><span class="dw-val">${badgeHtml(b.status)}</span></div>
    </div>
    <div class="dw-sec">
      <div class="dw-sec-title">Service Details</div>
      <div class="dw-row"><span class="dw-key">Service</span><span class="dw-val" style="font-family:'Cormorant',serif;font-size:18px;font-weight:600;">${b.service}</span></div>
      <div class="dw-row"><span class="dw-key">Service Date</span><span class="dw-val">${fmtDate(b.date)}</span></div>
      <div class="dw-row"><span class="dw-key">Time Slot</span><span class="dw-val">${fmtTime(b.time)}</span></div>
      <div class="dw-row"><span class="dw-key">Total Price</span><span class="dw-val gold">$${(b.price||0).toLocaleString()}</span></div>
    </div>
    <div class="dw-sec">
      <div class="dw-sec-title">Logistics</div>
      <div class="dw-row"><span class="dw-key">Dispatched From</span><span class="dw-val">${b.origin||'—'}</span></div>
      <div class="dw-row"><span class="dw-key">Destination</span><span class="dw-val">${b.address||'—'}</span></div>
      ${b.notes?`<div class="dw-row"><span class="dw-key">Notes</span><span class="dw-val">${b.notes}</span></div>`:''}
    </div>
    ${b.status!=='cancelled'?`<div class="dw-sec"><div class="dw-sec-title">Progress</div>${progressHtml(b)}</div>`:''}
  `;

  let foot=`<button class="btn btn-ghost" id="dwClose2">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>Close
  </button>`;
  if(b.status==='pending'){
    foot+=`<button class="btn btn-blue" id="dwDisp"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>Dispatch</button>
    <button class="btn btn-red" id="dwCanc"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>Cancel</button>`;
  }else if(b.status==='dispatch'){
    foot+=`<button class="btn btn-green" id="dwComp"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>Mark Completed</button>`;
  }
  document.getElementById('dwFoot').innerHTML=foot;

  document.getElementById('dwClose2')?.addEventListener('click',closeDrawer);
  document.getElementById('dwDisp')?.addEventListener('click',()=>{b.status='dispatch';save();render();openDrawer(id);toast('Dispatched!','ok');});
  document.getElementById('dwComp')?.addEventListener('click',()=>{b.status='success';save();render();openDrawer(id);toast('Marked complete!','ok');});
  document.getElementById('dwCanc')?.addEventListener('click',()=>{if(!confirm('Cancel this booking?'))return;b.status='cancelled';save();render();closeDrawer();toast('Cancelled.','err');});

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('dwClose').addEventListener('click',closeDrawer);
document.getElementById('overlay').addEventListener('click',closeDrawer);

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');curTab=tab.dataset.tab;render();
  });
});

document.querySelectorAll('[data-fnav]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    curTab=a.dataset.fnav;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${curTab}"]`)?.classList.add('active');
    document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
    a.classList.add('active');render();
  });
});

document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.trim();render();});

document.getElementById('sortBtn').addEventListener('click',function(){
  sortAsc=!sortAsc;
  this.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="12" height="12"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/></svg>${sortAsc?'Oldest First':'Newest First'}`;
  render();
});

document.getElementById('refreshBtn').addEventListener('click',()=>{
  try{bookings=JSON.parse(localStorage.getItem('ceBookings')||'[]');}catch(e){}
  render();toast('Orders refreshed','ok');
});

document.getElementById('logoutBtn').addEventListener('click',()=>{
  if(!confirm('Sign out of Service Panel?'))return;
  sessionStorage.removeItem('user');
  toast('Signing out…','ok');
  setTimeout(()=>window.location.replace('../Login/login.html'),1200);
});

render();
})();
</script>
</body>
</html>
